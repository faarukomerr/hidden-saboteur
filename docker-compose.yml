version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hs-postgres
    environment:
      POSTGRES_USER: saboteur
      POSTGRES_PASSWORD: saboteur_password
      POSTGRES_DB: hidden_saboteur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
